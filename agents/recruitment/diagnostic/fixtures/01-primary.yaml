      url: "https://charterhouse-partners.com/careers"
      state: "active"
      last_updated_signal: "2026-05-15"
      urgency_phrases_found:
        - "we're tripling our engineering team this year"
        - "rapid growth in our payments practice"

# Expected report attributes
expected_report:
  word_count_range: [700, 900]
  section_count: 12
  citations_per_section_min: 1
  voice_classifier_score_min: 0.78
  vault_path_template: "/vault/migration-test/diagnostic-reports/charterhouse-partners-{ISO_DATE}.md"

# Validation expectations
expected_validations:
  V1_12_sections: PASS
  V2_per_section_citation: PASS
  V3_voice_score: PASS  # ≥ 0.75 required
  V4_word_count: PASS   # 400-2000
  V5_banned_phrases: PASS
  V6_pii_boundary: PASS

# Decision-log audit rows expected after run
expected_decision_log_rows:
  - phase: trigger
    agent_name: diagnostic
    payload_includes: {trigger_type: "session_start"}
  - phase: output
    agent_name: diagnostic
    payload_includes: {output_type: "diagnostic_draft"}
  - phase: action
    agent_name: diagnostic
    action_type: diagnostic_report_render
    payload_includes: {firm_name: "Charterhouse Partners"}
  - phase: action
    agent_name: diagnostic
    action_type: diagnostic_cleanup
