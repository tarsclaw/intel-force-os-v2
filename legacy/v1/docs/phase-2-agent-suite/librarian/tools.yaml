agent: librarian
version: 1.0.0

required:
  - name: filesystem
    purpose: "Walk the vault, read/modify tags, move files to archive, write rollups"
    mcp_server: null
    tools_used: [Read, Write, Edit, Bash, Grep, Glob]

  - name: cohere
    purpose: "Generate embeddings for new/changed content"
    mcp_server:
      type: build-your-own
      status: "light wrapper — essentially curl + jq"
      priority: "CC9"
    auth:
      type: api_key
      secret_ref: "secrets://{tenant_id}/cohere/api_key"
    tools_used: []
    scopes_required: []
    degraded_mode:
      condition: "Cohere API unreachable"
      behaviour: "Escalate EMBEDDING_PROVIDER_DOWN; continue other Librarian tasks (tagging, archiving, rollup) without indexing"

  - name: pgvector
    purpose: "Upsert chunks into tenant's schema"
    mcp_server: null
    tools_used: [Bash]
    scopes_required: []
    degraded_mode:
      condition: "pgvector unreachable"
      behaviour: "Escalate INDEX_CORRUPTION; log which chunks couldn't be written; retry next run"

optional: []

preflight_checks:
  - name: cohere-api-valid
    description: "POST /v1/embed with a test string"
    blocks_activation: false
    on_fail: "Agent activates with partial functionality — can't index until resolved"
  - name: pgvector-reachable
    description: "SELECT 1 against tenant schema"
    blocks_activation: false
  - name: vault-git-accessible
    description: "git log works inside /tenant/vault"
    blocks_activation: true

telemetry:
  emit_events:
    - name: librarian_nightly_started
    - name: librarian_nightly_completed
      properties: [indexed_count, archived_count, flagged_count, duration_sec, cost_gbp]
    - name: escalation_raised
      properties: [code]

  cost_budget_per_invocation:
    sonnet_input_tokens_max: 15000
    sonnet_output_tokens_max: 3000
    cohere_calls_max: 500
    alert_threshold_gbp: 1.00
    hard_stop_threshold_gbp: 2.50
